name: Platform validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bunx tsc --noEmit
      - run: bun run test:run
      - run: bun run build

  copilot:
    name: AI assistant API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/copilot-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/copilot-api/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
        env:
          ML_SERVICE_URL: http://127.0.0.1:8000
          COPILOT_ALLOW_FORECAST_FALLBACK: "true"

  ml:
    name: ML API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/ml-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: pytest
      - run: ruff check .
      - run: mypy
      - run: python -m surplussync_ml.bootstrap
        env:
          ALLOW_DEMO_FIXTURE: "true"
